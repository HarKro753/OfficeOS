<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OfficeOS GitHub banner</title>
  <desc id="desc">A product banner for OfficeOS showing a source-of-truth package moving through readiness, implementation, QA, release, and monitoring.</desc>
  <defs>
